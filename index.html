<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/index.css">
        <script src="js/index.js" defer></script>
        <script src="https://www.kryogenix.org/code/browser/sorttable/sorttable.js" defer></script>
        <title>Yugioh Database</title>
    </head>
    <body>
        <header id="title">
            <h2>Card Search</h2>
        </header>
        <div id="container" class="container">
            <div id="searchcol" class="column">
                <div id="search">
                    <input id="textbox" type="search" placeholder="Search" onchange="search()" autocomplete="off"/>
                    <label for="textbox"></label>
                    <input id="submit" type="submit" value="" onclick="search()"/>
                    <label for="submit"></label>
                </div>
                <div id="resize">
                    <input id="smaller" type="button" value="&#8722;" onclick="sub()"/> 
                    <label for="smaller"></label>
                    <input id="bigger" type="button" value="&#43;" onclick="add()"/> 
                    <label for="bigger"></label>
                    <input id="close" type="button" value="&#215;" onclick="closeresults()"/> 
                    <label for="close"></label>
                </div>
                <div id="gallery">
                    <!--js injection-->
                </div>
                
            </div>
            <div id="infocol" class="column">
                <div id="image">
                    <!--js injection-->
                </div>
                <div id="info">
                    <!--js injection-->
                </div>
            </div>
            
        </div>
        
    </body>
</html>
