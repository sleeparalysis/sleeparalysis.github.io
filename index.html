<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/index.css">
        <script src="js/index.js" defer></script>
        <script src="https://www.kryogenix.org/code/browser/sorttable/sorttable.js" defer></script>
        <title>Yugioh Database</title>
    </head>
    <body>
        <div id="container" class="container">
            <div id="imagecol" class="column">
                <div id="image">
                    <img
                    id="${id}"
                    class="card"
                    src="https://raw.githubusercontent.com/sleeparalysis/ygocards/main/img/cards/back.jpg"
                    loading="eager"
                    />
                    <!--js injection-->
                </div>
                <div id="info"><!--id="info"-->
                    <!--js injection-->
                </div>
            </div>
            <div id="infocol">
               
            </div>

            <div id="searchcol" class="column">
                <div id="search">
                    <input id="textbox" type="search" placeholder="Search" onchange="search()" autocomplete="off"/>
                    <label for="textbox"></label>
                    <input id="submit" type="submit" value="" onclick="search()"/>
                    <label for="submit"></label>
                </div>
                <div id="gallery">
                    <!--js injection-->
                </div>
            </div>
        </div>
    </body>
</html>
